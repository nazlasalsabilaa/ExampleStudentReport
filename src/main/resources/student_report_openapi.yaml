  # ════════════════════════════════════════════════════════════════════════════
  # REPORTS
  # ════════════════════════════════════════════════════════════════════════════

  /reports:
    get:
      tags: [Reports]
      summary: List reports
      description: |
        - **User**: returns only their own non-deleted reports.
        - **Admin**: returns all reports (including soft-deleted) with optional filters.
      operationId: listReports
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QuerySize'
        - $ref: '#/components/parameters/QuerySearch'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReportStatus'
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: roomId
          in: query
          schema:
            type: string
            format: uuid
        - name: buildingId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeDeleted
          in: query
          description: Include soft-deleted reports. Admin only; ignored for Users.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of reports
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PagedResponse'
                          - type: object
                            properties:
                              content:
                                type: array
                                items:
                                  $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Reports]
      summary: Create a new report (User)
      description: |
        Submits a new report. Status is always initialised to `Pending` server-side.
        Increments the reporter's `UserStats.reportCount` and `UserStats.pendingReport`.
      operationId: createReport
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Referenced category or room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reports/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Reports]
      summary: Get report by ID
      description: |
        - **User**: only accessible if they are the reporter.
        - **Admin**: accessible for any report.
      operationId: getReportById
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Reports]
      summary: Update report content (reporter or Admin)
      description: |
        Updates title, description, category, or room. Status changes must use
        `PATCH /reports/{id}/status`.

        Reporters may only edit while the report status is `Pending`.
      operationId: updateReport
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportRequest'
      responses:
        '200':
          description: Updated report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Reports]
      summary: Soft-delete report (reporter or Admin)
      description: |
        Sets `deleted_at` to the current timestamp. The database row is **not**
        physically removed.

        If the record is later hard-deleted (admin operation), all related
        `Report_Image`, `Upvote`, and `Report_Log` rows are cascade-deleted.
      operationId: deleteReport
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Report soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reports/{id}/status:
    parameters:
      - $ref: '#/components/parameters/PathId'
    patch:
      tags: [Reports]
      summary: Update report status (Admin only)
      description: |
        Applies a status transition and automatically creates a `ReportLog` entry.
        Also updates the reporter's `UserStats` counters atomically.

        **Valid transitions:**
        `Pending → In_Progress`, `In_Progress → Completed`,
        `Pending → Rejected`, `In_Progress → Rejected`
      operationId: updateReportStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportStatusRequest'
      responses:
        '200':
          description: Status updated and log entry created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntityStatus'

