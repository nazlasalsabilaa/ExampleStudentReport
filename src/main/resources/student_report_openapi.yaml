  # ════════════════════════════════════════════════════════════════════════════
  # UPVOTES
  # ════════════════════════════════════════════════════════════════════════════

  /reports/{id}/upvotes:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Upvotes]
      summary: Get upvote summary and current-user status for a report
      operationId: getUpvoteSummary
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Upvote summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpvoteSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Upvotes]
      summary: Upvote a report (User)
      description: |
        Each user may upvote a report exactly once, enforced at the API level
        (`409`) and at the database level via a composite unique index on
        `(user_id, report_id)`.
        Upvotes are cascade-deleted when the parent report is permanently removed.
      operationId: upvoteReport
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '201':
          description: Upvote recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpvoteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [Upvotes]
      summary: Remove own upvote from a report (User)
      operationId: removeUpvote
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Upvote removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════════════════════════
  # REPORT LOG
  # ════════════════════════════════════════════════════════════════════════════

  /reports/{id}/logs:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Report Log]
      summary: Get audit log for a specific report
      description: |
        Returns all status-change log entries for the given report, newest first.
        - **User**: can view logs of their own reports only.
        - **Admin**: can view logs for any report.

        Log entries are cascade-deleted when the parent report is permanently removed.
      operationId: getReportLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QuerySize'
      responses:
        '200':
          description: Paginated log entries for the report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PagedResponse'
                          - type: object
                            properties:
                              content:
                                type: array
                                items:
                                  $ref: '#/components/schemas/ReportLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /report-logs:
    get:
      tags: [Report Log]
      summary: List all report log entries (Admin only)
      operationId: listAllReportLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QuerySize'
        - name: adminId
          in: query
          description: Filter by the admin who made the change.
          schema:
            type: string
            format: uuid
        - name: reportId
          in: query
          description: Filter by report.
          schema:
            type: string
            format: uuid
        - name: newStatus
          in: query
          description: Filter by the resulting status.
          schema:
            $ref: '#/components/schemas/ReportStatus'
      responses:
        '200':
          description: Paginated list of all log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PagedResponse'
                          - type: object
                            properties:
                              content:
                                type: array
                                items:
                                  $ref: '#/components/schemas/ReportLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /report-logs/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Report Log]
      summary: Get a single log entry by ID (Admin only)
      operationId: getReportLogById
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Log entry detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
