        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reports/{id}/images/{imageId}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - name: imageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
