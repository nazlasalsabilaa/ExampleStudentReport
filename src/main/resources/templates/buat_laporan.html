<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Laporan - Student Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Inter', sans-serif;">

<div class="d-flex min-vh-100">
    <div th:replace="~{fragments/sidebar :: sidebar-menu(activePage='buatLaporan')}"></div>

        <div class="flex-grow-1 d-flex flex-column bg-white">

            <div th:replace="~{fragments/header :: top-navbar}"></div>

                <main class="p-4 flex-grow-1" style="background-color: #D4EBF8">
                    <div class="mb-4">
                        <h2 class="h4 fw-bold text-dark mb-1">Buat Laporan Baru</h2>
                        <p class="text-secondary small mb-0">Laporkan kerusakan fasilitas kampus</p>
                    </div>

                    <div class="bg-white p-4 shadow-sm mx-auto" style="border-radius: 12px; max-width: 800px;">
                        <form action="/report/submit" method="post" enctype="multipart/form-data">

                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark d-flex align-items-center gap-2 mb-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                    Foto Kerusakan<span class="text-danger">*</span>
                                </label>

                                <div class="upload-area p-5 text-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-3">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="17 8 12 3 7 8"></polyline>
                                        <line x1="12" y1="3" x2="12" y2="15"></line>
                                    </svg>
                                    <h5 class="h6 fw-bold mb-1">Klik untuk unggah atau seret file di sini</h5>
                                    <p class="text-muted small mb-0">PNG, JPG, dan SVG, max ukuran file 10MB</p>
                                    <input type="file" class="d-none" id="fotoKerusakan" name="fotoKerusakan" accept="image/png, image/jpeg, image/svg+xml">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="kategori" class="form-label fw-bold text-dark d-flex align-items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                                    </svg>
                                    Kategori Kerusakan<span class="text-danger">*</span>
                                </label>
                                <select class="form-select py-2 text-muted" id="kategori" name="categoryId" required>
                                    <option selected disabled value="">Pilih Kategori Kerusakan</option>
                                    <option
                                            th:each="cat : ${listKategori}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}">Nama Kategori</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark d-flex align-items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                        <circle cx="12" cy="10" r="3"></circle>
                                    </svg>
                                    Lokasi<span class="text-danger">*</span>
                                </label>
                                <div class="row g-3 mb-3">
                                    <div class="col-12 col-md-6">
                                        <select class="form-select py-2 text-muted" name="roomId" required>
                                            <option selected disabled value="">Pilih Ruangan</option>
                                            <option
                                                th:each="ruang : ${listRuangan}"
                                                th:value="${ruang.id}"
                                                th:text="${ruang.name} + ' (Lantai ' + ${ruang.floor} +')'">Nama Ruangan</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <input type="text" class="form-control py-2" placeholder="Nama Ruangan (Contoh: Lab Big Data)" name="namaRuangan" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="deskripsi" class="form-label fw-bold text-dark d-flex align-items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                        <line x1="16" y1="13" x2="8" y2="13"></line>
                                        <line x1="16" y1="17" x2="8" y2="17"></line>
                                        <polyline points="10 9 9 9 8 9"></polyline>
                                    </svg>
                                    Deskripsi Kerusakan<span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control py-2" id="deskripsi" name="deskripsi" rows="4" placeholder="Jelaskan kondisi kerusakan dengan detail." required></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-3 mt-5">
                                <a href="/dashboard" class="btn btn-white border px-4 py-2 fw-semibold text-dark rounded-3">Batal</a>
                                <button type="submit" class="btn px-4 py-2 fw-bold d-flex align-items-center gap-2 rounded-3" style="background-color: #BDE0FE; color: #0F172A; border: 1px solid #A2D2FF;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                    Kirim Laporan
                                </button>
                            </div>
                        </form>
                    </div>
                </main>
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/script.js"></script>
</body>
</html>
