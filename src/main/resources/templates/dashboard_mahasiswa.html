<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mahasiswa - Student Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {font-family: 'Inter', sans-serif}
    </style>
</head>
<body class="bg-light">
<div class="d-flex min-vh-100">
    <div th:replace="~{fragments/sidebar :: sidebar-menu(activePage='dashboard')}"></div>
    <div class="flex-grow-1 d-flex flex-column bg-white">
        <div th:replace="~{fragments/header :: top-navbar}"></div>

        <main class="p-4 flex-grow-1" style="background-color: #D4EBF8;">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                <div>
                    <h2 class="h4 fw-bold text-dark mb-1">Dashboard Mahasiswa</h2>
                    <p class="text-secondary small mb-0">Status laporan kerusakan fasilitas kampus Anda</p>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12 col-md-4">
                    <div class="bg-white p-3 shadow-sm text-center d-flex flex-column justify-content-center align-items-center h-100" style="border-radius: 12px; border: 1.5px solid #A2D2FF;">
                        <p class="fw-bold mb-2 text-dark text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">JUMLAH LAPORAN SAYA</p>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <h2 class="fw-bold mb-0 text-dark" style="font-size: 2.2rem;" th:text="${userStats?.reportCount ?: '3'}">3</h2>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="bg-white p-3 shadow-sm text-center d-flex flex-column justify-content-center align-items-center h-100" style="border-radius: 12px; border: 1.5px solid #ffda6a;">
                        <p class="fw-bold mb-2 text-dark text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">LAPORAN DIPROSES</p>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <h2 class="fw-bold mb-0 text-dark" style="font-size: 2.2rem;" th:text="${userStats?.pendingReport ?: '1'}">1</h2>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffc107" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="bg-white p-3 shadow-sm text-center d-flex flex-column justify-content-center align-items-center h-100" style="border-radius: 12px; border: 1.5px solid #75b798;">
                        <p class="fw-bold mb-2 text-dark text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">LAPORAN SELESAI</p>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <h2 class="fw-bold mb-0 text-dark" style="font-size: 2.2rem;" th:text="${userStats?.completedReport ?: '2'}">2</h2>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#198754" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 shadow-sm" style="border-radius: 12px;">
                <h3 class="h5 fw-bold text-dark mb-4">Laporan Terbaru</h3>

                <div class="row g-4">
                    <div th:if="${#lists.isEmpty(recentReports)}" class="col-12 text-center text-muted py-3">
                        Belum ada laporan yang diajukan.
                    </div>

                    <th:block th:each="report: ${recentReports}">
                        <div th:replace="~{fragments/card :: report-card-simple(report=${report})}"></div>
                    </th:block>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
