<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="top-navbar" class="navbar navbar-expand bg-white px-4 py-3 border-bottom sticky-top w-100">
    <div class="container-fluid p-0">
        <h1 class="h5 fw-bold text-dark mb-0" style="letter-spacing: -0.2px;">Portal Fasilitas Kampus</h1>
        <div class="ms-auto d-flex align-items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <div class="bg-dark rounded-circle d-flex justify-content-center align-items-center text-white fw-bold" style="width: 28px; height: 28px; font-size: 0.75rem;">
                <span th:text="${user?.nama?.substring(0,1) ?: 'U'}">U</span>
            </div>
        </div>
    </div>
</header>
</body>
</html>
