<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar-menu(activePage)" class="bg-white border-end d-flex flex-column vh-100 sticky-top" style="width: 260px; min-width: 260px;">

    <div class="p-4 border-bottom d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12" y2="16"></line>
        </svg>
        <span class="fw-bold text-dark" style="font-size: 1.1rem; letter-spacing: 0.5px;">STUDENT REPORT</span>
    </div>

    <div class="d-flex flex-column px-3 py-3 gap-1 flex-grow-1">

        <a href="/dashboard" class="nav-link-custom d-flex align-items-center gap-3 py-2.5 px-3 rounded text-decoration-none fw-semibold"
        th:classappend="${activePage == 'dashboard'} ? 'active' : 'text-secondary'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect height="9" width="7" x="3" y="3"></rect>
                <rect height="5" width="7" x="14" y="3"></rect>
                <rect height="9" width="7" x="14" y="12"></rect>
                <rect height="5" width="7" x="3" y="16"></rect>
            </svg>
            <span>Dashboard</span>
        </a>

        <a href="/feed" class="nav-link-custom d-flex align-items-center gap-3 py-2.5 px-3 rounded text-decoration-none fw-semibold"
        th:classappend="${activePage == 'feed'} ? 'active' : 'text-secondary'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            <span>Feed Laporan</span>
        </a>

        <a href="/report/create" class="nav-link-custom d-flex align-items-center gap-3 py-2.5 px-3 rounded text-decoration-none fw-semibold"
        th:classappend="${activePage == 'buatLaporan'} ? 'active' : 'text-secondary'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <span>Buat Laporan</span>
        </a>
    </div>

    <div class="p-3 border-top bg-light-subtle">
        <div class="d-flex align-items-center gap-2 mb-3 px-2">
            <div class="bg-dark rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" style="width: 32px; height: 32px; font-size: 0.8rem;">
                <span th:text="${user?.name?.substring(0,1) ?: 'U'}">U</span>
            </div>
            <div class="overflow-hidden">
                <p class="fw-bold text-dark mb-0 style-name" style="font-size: 0.85rem;" th:text="${user?.name ?: 'Nama User'}">Nama User</p>
                <p class="text-muted mb-0 style-email" style="font-size: 0.75rem;" th:text="${user?.email ?: 'nim@mhs.ulm.ac.id'}">nim@mhs.ulm.ac.id</p>
            </div>
        </div>

        <div class="d-flex flex-column gap-1" style="font-size: 0.85rem;">
            <a href="/settings" class="text-dark text-decoration-none py-1.5 px-2 rounded hover-subtle d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>Pengaturan</span>
            </a>
            <a href="/logout" class="text-dark text-decoration-none py-1.5 px-2 rounded hover-subtle d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </a>
        </div>
    </div>
</aside>
</body>
</html>
